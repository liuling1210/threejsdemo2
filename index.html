<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js GLB Loader - tongren</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #fff;
      }

      #viewport {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* 左侧光照面板 */
      #leftLightingPanel {
        position: static;
        background-color: #fff;
        border: 2px solid #333;
        border-radius: 5px;
        padding: 15px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        min-width: 240px;
      }

      #leftLightingPanel h3 {
        margin: 0 0 15px 0;
        font-size: 16px;
        font-weight: bold;
        color: #333;
        border-bottom: 1px solid #ddd;
        padding-bottom: 8px;
      }

      #leftLightingPanel .lighting-control-group {
        margin-bottom: 15px;
      }

      #leftLightingPanel .lighting-control-group label {
        display: block;
        font-size: 13px;
        font-weight: bold;
        color: #333;
        margin-bottom: 5px;
      }

      #leftLightingPanel .lighting-control-group input[type="range"] {
        width: 100%;
        margin-bottom: 5px;
      }

      #leftLightingPanel .lighting-control-group input[type="number"] {
        width: 70px;
        padding: 4px;
        font-size: 12px;
        border: 1px solid #ccc;
        border-radius: 3px;
      }

      #leftLightingPanel .lighting-control-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      #leftLightingPanel .lighting-control-row label {
        margin-bottom: 0;
        min-width: 28px;
      }

      #leftLightingPanel .lighting-toggle {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
      }

      /* 左侧面板容器：光照 + 场景与地面 */
      #leftPanelsWrap {
        position: absolute;
        left: 20px;
        top: 20px;
        z-index: 100;
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-height: 95vh;
        overflow-y: auto;
      }

      #leftScenePanel {
        background-color: #fff;
        border: 2px solid #333;
        border-radius: 5px;
        padding: 15px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        min-width: 240px;
      }

      #leftScenePanel h3 {
        margin: 0 0 15px 0;
        font-size: 16px;
        font-weight: bold;
        color: #333;
        border-bottom: 1px solid #ddd;
        padding-bottom: 8px;
      }

      #leftScenePanel .lighting-control-group {
        margin-bottom: 15px;
      }

      #leftScenePanel .lighting-control-group label {
        display: block;
        font-size: 13px;
        font-weight: bold;
        color: #333;
        margin-bottom: 5px;
      }

      #leftScenePanel .lighting-control-group input[type="number"] {
        width: 70px;
        padding: 4px;
        font-size: 12px;
        border: 1px solid #ccc;
        border-radius: 3px;
      }

      #leftScenePanel .lighting-control-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      #leftScenePanel .lighting-control-row label {
        margin-bottom: 0;
        min-width: 28px;
      }

      #leftScenePanel .lighting-toggle {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
      }

      #uploadButton {
        position: absolute;
        top: 70px;
        right: 20px;
        z-index: 100;
        padding: 10px 20px;
        font-size: 14px;
        border: 2px solid #333;
        border-radius: 5px;
        background-color: #fff;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        transition: all 0.2s;
      }

      #uploadButton:hover {
        background-color: #f0f0f0;
        border-color: #666;
      }

      #uploadButton:active {
        background-color: #e0e0e0;
      }

      #fileInput {
        display: none;
      }

      /* 右侧 PBR 渲染面板（上传按钮下方） */
      #rightPbrPanel {
        position: absolute;
        top: 120px;
        right: 20px;
        z-index: 100;
        background-color: #fff;
        border: 2px solid #333;
        border-radius: 5px;
        padding: 15px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        min-width: 220px;
        max-height: 70vh;
        overflow-y: auto;
      }
      #rightPbrPanel h3 {
        margin: 0 0 12px 0;
        font-size: 15px;
        font-weight: bold;
        color: #333;
        border-bottom: 1px solid #ddd;
        padding-bottom: 6px;
      }
      #rightPbrPanel .pbr-group {
        margin-bottom: 12px;
      }
      #rightPbrPanel .pbr-group label {
        display: block;
        font-size: 12px;
        font-weight: bold;
        color: #333;
        margin-bottom: 4px;
      }
      #rightPbrPanel .pbr-group input[type="range"] {
        width: 100%;
        margin-bottom: 2px;
      }
      #rightPbrPanel .pbr-group input[type="number"] {
        width: 64px;
        padding: 4px;
        font-size: 12px;
        border: 1px solid #ccc;
        border-radius: 3px;
      }
      #rightPbrPanel .pbr-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 4px;
      }
      #rightPbrPanel .pbr-row label {
        margin-bottom: 0;
        min-width: 28px;
      }
      #rightPbrPanel .pbr-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        font-weight: bold;
        cursor: pointer;
      }
      #rightPbrPanel .pbr-toggle input {
        margin: 0;
      }

      /* 右侧面板容器：PBR + 关节控制 垂直排列 */
      #rightPanelsContainer {
        position: absolute;
        top: 120px;
        right: 20px;
        z-index: 100;
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-height: 85vh;
        overflow-y: auto;
        align-items: flex-end;
      }
      #rightPbrPanel {
        position: static;
        top: auto;
        right: auto;
      }
      /* 关节控制面板 */
      #jointPanel {
        background-color: #fff;
        border: 2px solid #333;
        border-radius: 5px;
        padding: 15px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        min-width: 220px;
      }
      #jointPanel h3 {
        margin: 0 0 12px 0;
        font-size: 15px;
        font-weight: bold;
        color: #333;
        border-bottom: 1px solid #ddd;
        padding-bottom: 6px;
      }
      #jointPanelList {
        max-height: 40vh;
        overflow-y: auto;
      }
      #jointPanel .joint-node {
        margin-bottom: 12px;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        background: #fafafa;
      }
      #jointPanel .joint-node-name {
        font-size: 12px;
        font-weight: bold;
        margin-bottom: 6px;
        word-break: break-all;
      }
      #jointPanel .joint-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 4px;
      }
      #jointPanel .joint-row label {
        min-width: 42px;
        font-size: 11px;
        color: #555;
      }
      #jointPanel .joint-row input[type="range"] {
        flex: 1;
        min-width: 60px;
        margin: 0 4px 0 0;
      }
      #jointPanel .joint-row input[type="number"] {
        width: 52px;
        padding: 3px;
        font-size: 11px;
        border: 1px solid #ccc;
        border-radius: 3px;
      }
      #jointPanelEmpty {
        font-size: 12px;
        color: #888;
        padding: 8px 0;
      }
      #modelInfoPanel {
        position: absolute;
        left: 20px;
        bottom: 20px;
        z-index: 100;
        background-color: rgba(255, 255, 255, 0.9);
        border: 1px solid #333;
        border-radius: 4px;
        padding: 8px 12px;
        font-size: 12px;
        font-family: monospace;
        color: #333;
        line-height: 1.5;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
      }
      #modelInfoPanel .info-title {
        font-weight: bold;
        margin-bottom: 4px;
      }

    </style>
  </head>
  <body>
    <canvas id="viewport"></canvas>

    <div id="modelInfoPanel">
      <div class="info-title">模型信息</div>
      <div id="modelInfoFileSize">文件大小: —</div>
      <div id="modelInfoFaces">面数: —</div>
      <div id="modelInfoFps">帧率: —</div>
    </div>

    <div id="leftPanelsWrap">
    <!-- 左侧光照面板：环境光 + 主光源平行光 -->
    <div id="leftLightingPanel">
      <h3>光照系统</h3>

      <div class="lighting-control-group">
        <label>环境光强度</label>
        <input type="range" id="leftHemiIntensity" min="0" max="2" step="0.1" value="1.0" />
        <div class="lighting-control-row">
          <label>值:</label>
          <input type="number" id="leftHemiIntensityValue" min="0" max="2" step="0.1" value="1.0" />
        </div>
      </div>

      <div class="lighting-control-group">
        <label>主光源平行光 · 强度</label>
        <input type="range" id="leftDirIntensity" min="0" max="3" step="0.1" value="1.5" />
        <div class="lighting-control-row">
          <label>值:</label>
          <input type="number" id="leftDirIntensityValue" min="0" max="3" step="0.1" value="1.5" />
        </div>
        <label style="margin-top: 8px;">位置</label>
        <div class="lighting-control-row">
          <label>X:</label>
          <input type="number" id="leftDirX" step="0.5" value="5" />
          <label>Y:</label>
          <input type="number" id="leftDirY" step="0.5" value="10" />
          <label>Z:</label>
          <input type="number" id="leftDirZ" step="0.5" value="7.5" />
        </div>
      </div>
    </div>

    <!-- 场景与地面面板 -->
    <div id="leftScenePanel">
      <h3>场景与地面</h3>
      <div class="lighting-control-group">
        <label>模型位置</label>
        <div class="lighting-control-row">
          <label>X:</label>
          <input type="number" id="modelPosX" step="0.1" value="0" />
          <label>Y:</label>
          <input type="number" id="modelPosY" step="0.1" value="0" />
          <label>Z:</label>
          <input type="number" id="modelPosZ" step="0.1" value="0" />
        </div>
      </div>
      <div class="lighting-control-group">
        <label>场景背景颜色</label>
        <div class="lighting-control-row">
          <input type="color" id="sceneBgColor" value="#cccccc" />
        </div>
      </div>
      <div class="lighting-control-group">
        <label>地面平台</label>
        <div class="lighting-control-row">
          <label>宽:</label>
          <input type="number" id="groundSizeW" min="1" step="1" value="20" />
          <label>深:</label>
          <input type="number" id="groundSizeD" min="1" step="1" value="20" />
        </div>
        <div class="lighting-control-row">
          <label>颜色:</label>
          <input type="color" id="groundColor" value="#888888" />
        </div>
      </div>
      <div class="lighting-control-group">
        <div class="lighting-toggle">
          <input type="checkbox" id="shadowEnabled" checked />
          <label for="shadowEnabled">阴影开关</label>
        </div>
        <label>阴影柔和度</label>
        <div class="lighting-control-row">
          <input type="range" id="shadowRadius" min="0" max="10" step="0.5" value="0" />
          <input type="number" id="shadowRadiusValue" min="0" max="10" step="0.5" value="0" style="width:50px;" />
        </div>
      </div>
      <div class="lighting-control-group">
        <div class="lighting-toggle">
          <input type="checkbox" id="groundGridEnabled" />
          <label for="groundGridEnabled">地面网格</label>
        </div>
      </div>
      <div class="lighting-control-group">
        <div class="lighting-toggle">
          <input type="checkbox" id="modelAxesEnabled" />
          <label for="modelAxesEnabled">模型三轴</label>
        </div>
      </div>
    </div>
    </div>

    <button id="uploadButton">上传GLB模型</button>
    <input type="file" id="fileInput" accept=".glb,.gltf" />

    <div id="rightPanelsContainer">
    <div id="rightPbrPanel">
      <h3>PBR 渲染</h3>
      <div class="pbr-group">
        <label>金属度 (metalness)</label>
        <input type="range" id="pbrMetalness" min="0" max="1" step="0.01" value="0" />
        <div class="pbr-row">
          <label>值:</label>
          <input type="number" id="pbrMetalnessValue" min="0" max="1" step="0.01" value="0" />
        </div>
      </div>
      <div class="pbr-group">
        <label>粗糙度 (roughness)</label>
        <input type="range" id="pbrRoughness" min="0" max="1" step="0.01" value="0.5" />
        <div class="pbr-row">
          <label>值:</label>
          <input type="number" id="pbrRoughnessValue" min="0" max="1" step="0.01" value="0.5" />
        </div>
      </div>
      <div class="pbr-group">
        <label class="pbr-toggle">
          <input type="checkbox" id="imageEnvMapEnabled" checked />
          启用环境贴图
        </label>
        <div id="imageEnvMapParams" style="margin-top:8px;">
          <label>环境贴图强度</label>
          <input type="range" id="pbrEnvMapIntensity" min="0" max="2" step="0.05" value="1" />
          <div class="pbr-row">
            <label>值:</label>
            <input type="number" id="pbrEnvMapIntensityValue" min="0" max="2" step="0.05" value="1" />
          </div>
        </div>
      </div>
      <div class="pbr-group" style="margin-top:12px;">
        <label class="pbr-toggle">
          <input type="checkbox" id="pbrEnvEnabled" checked />
          启用 PBR 与环境贴图
        </label>
      </div>
      <div class="pbr-group" style="margin-top:12px; padding-top:10px; border-top:1px solid #ddd;">
        <label class="pbr-toggle">
          <input type="checkbox" id="pbrTransparencyEnabled" />
          开启透明度渲染
        </label>
        <div id="pbrTransparencyControls" style="display:none; margin-top:8px;">
          <label>透明度 (opacity)</label>
          <input type="range" id="pbrOpacity" min="0" max="1" step="0.01" value="0.8" />
          <div class="pbr-row">
            <label>值:</label>
            <input type="number" id="pbrOpacityValue" min="0" max="1" step="0.01" value="0.8" />
          </div>
          <label>Alpha 测试 (alphaTest)</label>
          <input type="range" id="pbrAlphaTest" min="0" max="1" step="0.01" value="0" />
          <div class="pbr-row">
            <label>值:</label>
            <input type="number" id="pbrAlphaTestValue" min="0" max="1" step="0.01" value="0" />
          </div>
        </div>
      </div>
    </div>

    <div id="jointPanel">
      <h3>关节控制</h3>
      <div id="jointPanelList">
        <div id="jointPanelEmpty">请先加载模型</div>
      </div>
    </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      const canvas = document.querySelector("#viewport");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.shadowMap.enabled = true;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xcccccc);

      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(1.5, 1.5, 3);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 1, 0);

      // 添加环境光
      const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
      hemiLight.position.set(0, 1, 0);
      scene.add(hemiLight);

      // 添加方向光
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
      dirLight.position.set(5, 10, 7.5);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 2048;
      dirLight.shadow.mapSize.height = 2048;
      dirLight.shadow.camera.near = 0.5;
      dirLight.shadow.camera.far = 50;
      scene.add(dirLight);

      // 点光源（默认关闭）
      const pointLight = new THREE.PointLight(0xffffff, 1.0, 100);
      pointLight.position.set(0, 5, 0);
      pointLight.visible = false;
      scene.add(pointLight);

      // 聚光灯（默认关闭）
      const spotLight = new THREE.SpotLight(0xffffff, 1.0);
      spotLight.position.set(5, 10, 5);
      spotLight.angle = Math.PI / 6; // 30度
      spotLight.penumbra = 0.1;
      spotLight.decay = 2;
      spotLight.distance = 200;
      spotLight.target.position.set(0, 0, 0); // 指向模型中心
      spotLight.visible = false;
      scene.add(spotLight);
      scene.add(spotLight.target); // 需要将target添加到场景中

      // 地面平台：用于接收模型投射的阴影
      const groundGeometry = new THREE.PlaneGeometry(20, 20);
      const groundMaterial = new THREE.MeshStandardMaterial({
        color: 0x888888,
        roughness: 0.8,
        metalness: 0.2
      });
      const groundPlaneMesh = new THREE.Mesh(groundGeometry, groundMaterial);
      groundPlaneMesh.rotation.x = -Math.PI / 2; // 水平放置（XZ 平面）
      groundPlaneMesh.position.set(0, -2, 0);
      groundPlaneMesh.receiveShadow = true;
      scene.add(groundPlaneMesh);

      // 地面网格（GridHelper 默认在 XZ 平面，不旋转；与地面平台二选一显示）
      const groundGridHelper = new THREE.GridHelper(20, 20, 0x666666, 0x888888);
      groundGridHelper.position.set(0, -2, 0);
      groundGridHelper.visible = false;
      scene.add(groundGridHelper);

      let modelAxesHelper = null; // 模型三轴辅助，加载模型时创建

      // 扩大平行光阴影相机范围，确保能照到地面平台
      dirLight.shadow.camera.left = -12;
      dirLight.shadow.camera.right = 12;
      dirLight.shadow.camera.top = 12;
      dirLight.shadow.camera.bottom = -12;
      dirLight.shadow.camera.near = 0.5;
      dirLight.shadow.camera.far = 50;

      // 环境贴图相关变量
      let envMap = null; // 存储生成的环境贴图
      let cubeCamera = null; // CubeCamera 实例
      let useImageEnvMap = false; // 是否使用图片环境贴图（为 true 时不使用 CubeCamera 覆盖）
      const pmremGenerator = new THREE.PMREMGenerator(renderer);
      pmremGenerator.compileEquirectangularShader();

      // 透明材质反射补偿：Three.js 会将最终颜色（含反射）乘上 opacity，导致反射被压暗。此处对透明材质提高 envMapIntensity，使反射在乘 opacity 后仍接近设定强度。
      function getEnvMapIntensityForMaterial(mat, baseIntensity) {
        const opacity = typeof mat.opacity === "number" ? mat.opacity : 1;
        const isTransparent = mat.transparent === true || (opacity < 1);
        if (!isTransparent) return baseIntensity;
        return baseIntensity / Math.max(0.01, opacity);
      }

      // 加载 huanjingtietu.png 作为场景环境贴图（全景图转立方体贴图）
      function loadImageEnvironmentMap() {
        const loader = new THREE.TextureLoader();
        loader.load(
          "huanjingtietu.png",
          (texture) => {
            texture.mapping = THREE.EquirectangularReflectionMapping;
            texture.colorSpace = THREE.SRGBColorSpace;
            const cubeEnvMap = pmremGenerator.fromEquirectangular(texture).texture;
            texture.dispose();
            // 清理旧的环境贴图
            if (envMap) {
              envMap.dispose();
              envMap = null;
            }
            if (cubeCamera) {
              cubeCamera.renderTarget.dispose();
              scene.remove(cubeCamera);
              cubeCamera = null;
            }
            envMap = cubeEnvMap;
            scene.environment = envMap;
            useImageEnvMap = true;
            const envIntensityEl = document.getElementById("pbrEnvMapIntensityValue");
            const envIntensity = envIntensityEl ? parseFloat(envIntensityEl.value) || 1 : 1;
            // 应用到已加载的模型
            if (modelRef) {
              modelRef.traverse((child) => {
                if (child.isMesh && child.material) {
                  if (Array.isArray(child.material)) {
                    child.material.forEach((mat) => {
                      if (mat.isMeshStandardMaterial || mat.isMeshPhysicalMaterial) {
                        mat.envMap = envMap;
                        mat.envMapIntensity = getEnvMapIntensityForMaterial(mat, envIntensity);
                        mat.needsUpdate = true;
                      }
                    });
                  } else {
                    if (child.material.isMeshStandardMaterial || child.material.isMeshPhysicalMaterial) {
                      child.material.envMap = envMap;
                      child.material.envMapIntensity = getEnvMapIntensityForMaterial(child.material, envIntensity);
                      child.material.needsUpdate = true;
                    }
                  }
                }
              });
            }
            if (typeof syncPbrFromPanel === "function") syncPbrFromPanel();
            console.log("环境贴图 huanjingtietu.png 已加载并应用");
          },
          undefined,
          (err) => console.warn("加载环境贴图 huanjingtietu.png 失败:", err)
        );
      }

      // 关闭图片环境贴图（释放贴图、清空场景与材质的 envMap）
      function clearImageEnvironmentMap() {
        useImageEnvMap = false;
        if (envMap) {
          envMap.dispose();
          envMap = null;
        }
        scene.environment = null;
        if (modelRef) {
          modelRef.traverse((child) => {
            if (child.isMesh && child.material) {
              const mats = Array.isArray(child.material) ? child.material : [child.material];
              mats.forEach((mat) => {
                if (mat.isMeshStandardMaterial || mat.isMeshPhysicalMaterial) {
                  mat.envMap = null;
                  mat.envMapIntensity = 0;
                  mat.needsUpdate = true;
                }
              });
            }
          });
        }
        const paramsEl = document.getElementById("imageEnvMapParams");
        if (paramsEl) paramsEl.style.display = "none";
      }

      // 根据开关决定是否加载图片环境贴图
      const imageEnvMapCheckbox = document.getElementById("imageEnvMapEnabled");
      const imageEnvMapParamsEl = document.getElementById("imageEnvMapParams");
      if (imageEnvMapCheckbox && imageEnvMapParamsEl) {
        if (imageEnvMapCheckbox.checked) {
          loadImageEnvironmentMap();
          imageEnvMapParamsEl.style.display = "";
        } else {
          clearImageEnvironmentMap();
        }
        imageEnvMapCheckbox.addEventListener("change", () => {
          if (imageEnvMapCheckbox.checked) {
            loadImageEnvironmentMap();
            imageEnvMapParamsEl.style.display = "";
          } else {
            clearImageEnvironmentMap();
          }
        });
      } else {
        loadImageEnvironmentMap();
      }

      // 从场景光照生成环境贴图（使用 CubeCamera）
      function generateEnvironmentMapFromScene() {
        // 清理旧的环境贴图
        if (envMap) {
          envMap.dispose();
          envMap = null;
        }
        if (cubeCamera) {
          cubeCamera.renderTarget.dispose();
          scene.remove(cubeCamera);
          cubeCamera = null;
        }
        
        // 使用 CubeCamera 生成环境贴图
        const size = 512; // 环境贴图分辨率
        const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(size);
        cubeRenderTarget.texture.type = THREE.HalfFloatType;
        cubeRenderTarget.texture.colorSpace = THREE.SRGBColorSpace;
        
        cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
        
        // 临时隐藏模型，只渲染光照和背景
        const originalVisible = {};
        if (modelRef) {
          modelRef.traverse((child) => {
            if (child.isMesh) {
              originalVisible[child.uuid] = child.visible;
              child.visible = false;
            }
          });
        }
        
        // 从场景中心捕获6个方向
        cubeCamera.position.set(0, 0, 0);
        cubeCamera.update(renderer, scene);
        
        // 恢复模型可见性
        if (modelRef) {
          modelRef.traverse((child) => {
            if (child.isMesh && originalVisible.hasOwnProperty(child.uuid)) {
              child.visible = originalVisible[child.uuid];
            }
          });
        }
        
        envMap = cubeRenderTarget.texture;
        
        // 将环境贴图应用到场景
        scene.environment = envMap;
        
        // 将环境贴图应用到所有模型的材质
        if (modelRef) {
          modelRef.traverse((child) => {
            if (child.isMesh && child.material) {
              if (Array.isArray(child.material)) {
                child.material.forEach((mat) => {
                  if (mat.isMeshStandardMaterial || mat.isMeshPhysicalMaterial) {
                    mat.envMap = envMap;
                    mat.envMapIntensity = getEnvMapIntensityForMaterial(mat, 1.0);
                    mat.needsUpdate = true;
                  }
                });
              } else {
                if (child.material.isMeshStandardMaterial || child.material.isMeshPhysicalMaterial) {
                  child.material.envMap = envMap;
                  child.material.envMapIntensity = getEnvMapIntensityForMaterial(child.material, 1.0);
                  child.material.needsUpdate = true;
                }
              }
            }
          });
        }
        
        return envMap;
      }

      // 存储模型引用和当前高亮的mesh
      let modelRef = null;
      let lastModelFileSize = null; // 最近一次加载的模型文件大小（字节），URL 加载时为 null
      let highlightedMeshes = [];
      let highlightedLines = []; // 存储重新绘制的粗线
      let flowEffects = []; // 存储流动效果信息

      // 移除旧模型
      function removeOldModel() {
        if (modelRef) {
          // 清除所有高亮
          restoreHighlightedMeshes();
          
          // 移除并释放模型三轴辅助
          if (modelAxesHelper) {
            modelRef.remove(modelAxesHelper);
            modelAxesHelper.geometry.dispose();
            modelAxesHelper = null;
          }
          
          // 从场景中移除旧模型
          scene.remove(modelRef);
          
          // 清理模型资源
          modelRef.traverse((child) => {
            if (child.isMesh) {
              if (child.geometry) child.geometry.dispose();
              if (child.material) {
                if (Array.isArray(child.material)) {
                  child.material.forEach((mat) => mat.dispose());
                } else {
                  child.material.dispose();
                }
              }
            }
          });

          modelRef = null;
          modelAxesHelper = null;
          buildJointPanel(null);
        }
      }

      // 递归遍历模型节点，按树状结构打印 name / type / uuid / position / rotation（带缩进）
      function printSceneTree(node, indent, isLast) {
        if (indent === undefined) indent = "";
        if (isLast === undefined) isLast = true;
        const radToDeg = (r) => (r * 180) / Math.PI;
        const name = (node.name && node.name.trim() !== "") ? node.name : "(未命名)";
        const pos = node.position;
        const rot = node.rotation;
        const rotDeg = { x: Number(radToDeg(rot.x).toFixed(2)), y: Number(radToDeg(rot.y).toFixed(2)), z: Number(radToDeg(rot.z).toFixed(2)) };
        const branch = isLast ? "└─ " : "├─ ";
        const parentInfo = node.parent
          ? (" | parent.name: " + (node.parent.name && node.parent.name.trim() !== "" ? node.parent.name : "(未命名)") + " | parent.uuid: " + node.parent.uuid)
          : " | parent: (无)";
        console.log(
          indent + branch + name +
          " | type: " + node.type +
          " | uuid: " + node.uuid +
          parentInfo +
          " | position: (" + pos.x.toFixed(3) + ", " + pos.y.toFixed(3) + ", " + pos.z.toFixed(3) + ")" +
          " | rotation°: (" + rotDeg.x + ", " + rotDeg.y + ", " + rotDeg.z + ")"
        );
        const children = node.children || [];
        const nextIndent = indent + (isLast ? "   " : "│  ");
        for (let i = 0; i < children.length; i++) {
          printSceneTree(children[i], nextIndent, i === children.length - 1);
        }
      }

      // 关节控制面板：根据当前模型构建节点列表并绑定 rotation/position
      function buildJointPanel(model) {
        const listEl = document.getElementById("jointPanelList");
        const emptyEl = document.getElementById("jointPanelEmpty");
        if (!listEl) return;
        // 只移除动态添加的关节节点，保留空状态元素以便重复使用
        Array.from(listEl.children).forEach((c) => {
          if (c.classList && c.classList.contains("joint-node")) listEl.removeChild(c);
        });
        if (emptyEl) emptyEl.style.display = "";
        if (!model) {
          if (emptyEl) {
            emptyEl.textContent = "请先加载模型";
            emptyEl.style.display = "";
          }
          return;
        }
        const allNodes = [];
        model.traverse((n) => allNodes.push(n));
        if (allNodes.length === 0) {
          if (emptyEl) {
            emptyEl.textContent = "当前模型无可用节点";
            emptyEl.style.display = "";
          }
          return;
        }
        const radToDeg = (r) => (r * 180) / Math.PI;
        const nodeInfos = allNodes.map((n, i) => ({
          index: i,
          name: n.name && n.name.trim() !== "" ? n.name : "(未命名)",
          type: n.type,
          uuid: n.uuid,
          position: { x: n.position.x, y: n.position.y, z: n.position.z },
          rotationDeg: { x: Number(radToDeg(n.rotation.x).toFixed(2)), y: Number(radToDeg(n.rotation.y).toFixed(2)), z: Number(radToDeg(n.rotation.z).toFixed(2)) },
          childrenCount: n.children ? n.children.length : 0
        }));
        console.log("关节节点列表 (" + allNodes.length + " 个):", nodeInfos);
        console.log("========== 模型节点树（父子层级） ==========");
        printSceneTree(model, "");
        if (emptyEl) emptyEl.style.display = "none";
        const degToRad = (d) => (d * Math.PI) / 180;
        // 旋转范围缩小，避免轻微拖动就大幅运动（单位：度）
        const rotMin = -90, rotMax = 90, rotStep = 0.5;
        // 平移范围：与真实世界尺寸一致（单位：米，由 mm 换算）
        const posXMin = -0.32388, posXMax = 0.32388, posXStep = 0.001;  // X 最大 323.88 mm
        const posYMin = -0.1396, posYMax = 0.1396, posYStep = 0.001;    // Y 最大 139.6 mm
        const posZMin = -0.14949, posZMax = 0.14949, posZStep = 0.001;   // Z 最大 149.49 mm
        // 仅针对机械臂关节：axis_x / axis_y / axis_z
        const targetNames = ["axis_x", "axis_y", "axis_z"];
        const targetNodes = targetNames
          .map((jointName) => {
            const n = model.getObjectByName(jointName);
            return n ? { node: n, label: jointName } : null;
          })
          .filter((item) => item !== null);
        if (targetNodes.length === 0) {
          if (emptyEl) {
            emptyEl.textContent = "当前模型未找到 axis_x / axis_y / axis_z 关节";
            emptyEl.style.display = "";
          }
          return;
        }
        targetNodes.forEach(({ node, label }, index) => {
          const name = label;
          const block = document.createElement("div");
          block.className = "joint-node";
          block.innerHTML =
            '<div class="joint-node-name">' + escapeHtml(name) + "</div>" +
            '<div class="joint-row"><label>旋转X°</label><input type="range" min="' + rotMin + '" max="' + rotMax + '" step="' + rotStep + '" class="joint-rot-x-range" /><input type="number" step="0.1" class="joint-rot-x" /></div>' +
            '<div class="joint-row"><label>旋转Y°</label><input type="range" min="' + rotMin + '" max="' + rotMax + '" step="' + rotStep + '" class="joint-rot-y-range" /><input type="number" step="0.1" class="joint-rot-y" /></div>' +
            '<div class="joint-row"><label>旋转Z°</label><input type="range" min="' + rotMin + '" max="' + rotMax + '" step="' + rotStep + '" class="joint-rot-z-range" /><input type="number" step="0.1" class="joint-rot-z" /></div>' +
            '<div class="joint-row"><label>位置X(m)</label><input type="range" min="' + posXMin + '" max="' + posXMax + '" step="' + posXStep + '" class="joint-pos-x-range" /><input type="number" step="0.001" class="joint-pos-x" /></div>' +
            '<div class="joint-row"><label>位置Y(m)</label><input type="range" min="' + posYMin + '" max="' + posYMax + '" step="' + posYStep + '" class="joint-pos-y-range" /><input type="number" step="0.001" class="joint-pos-y" /></div>' +
            '<div class="joint-row"><label>位置Z(m)</label><input type="range" min="' + posZMin + '" max="' + posZMax + '" step="' + posZStep + '" class="joint-pos-z-range" /><input type="number" step="0.001" class="joint-pos-z" /></div>';
          const rotXRange = block.querySelector(".joint-rot-x-range");
          const rotYRange = block.querySelector(".joint-rot-y-range");
          const rotZRange = block.querySelector(".joint-rot-z-range");
          const rotX = block.querySelector(".joint-rot-x");
          const rotY = block.querySelector(".joint-rot-y");
          const rotZ = block.querySelector(".joint-rot-z");
          const posXRange = block.querySelector(".joint-pos-x-range");
          const posYRange = block.querySelector(".joint-pos-y-range");
          const posZRange = block.querySelector(".joint-pos-z-range");
          const posX = block.querySelector(".joint-pos-x");
          const posY = block.querySelector(".joint-pos-y");
          const posZ = block.querySelector(".joint-pos-z");
          const setRot = (r, rangeEl, numEl) => {
            const v = Math.max(rotMin, Math.min(rotMax, r));
            rangeEl.value = v;
            numEl.value = v.toFixed(2);
          };
          const setPosX = (p, rangeEl, numEl) => {
            const v = Math.max(posXMin, Math.min(posXMax, p));
            rangeEl.value = v;
            numEl.value = v.toFixed(3);
          };
          const setPosY = (p, rangeEl, numEl) => {
            const v = Math.max(posYMin, Math.min(posYMax, p));
            rangeEl.value = v;
            numEl.value = v.toFixed(3);
          };
          const setPosZ = (p, rangeEl, numEl) => {
            const v = Math.max(posZMin, Math.min(posZMax, p));
            rangeEl.value = v;
            numEl.value = v.toFixed(3);
          };
          setRot(radToDeg(node.rotation.x), rotXRange, rotX);
          setRot(radToDeg(node.rotation.y), rotYRange, rotY);
          setRot(radToDeg(node.rotation.z), rotZRange, rotZ);
          setPosX(node.position.x, posXRange, posX);
          setPosY(node.position.y, posYRange, posY);
          setPosZ(node.position.z, posZRange, posZ);
          const updateNode = () => {
            const rx = parseFloat(rotX.value) || 0;
            const ry = parseFloat(rotY.value) || 0;
            const rz = parseFloat(rotZ.value) || 0;
            const px = parseFloat(posX.value) || 0;
            const py = parseFloat(posY.value) || 0;
            const pz = parseFloat(posZ.value) || 0;
            node.rotation.set(degToRad(rx), degToRad(ry), degToRad(rz));
            node.position.set(px, py, pz);
            rotXRange.value = Math.max(rotMin, Math.min(rotMax, rx));
            rotYRange.value = Math.max(rotMin, Math.min(rotMax, ry));
            rotZRange.value = Math.max(rotMin, Math.min(rotMax, rz));
            posXRange.value = Math.max(posXMin, Math.min(posXMax, px));
            posYRange.value = Math.max(posYMin, Math.min(posYMax, py));
            posZRange.value = Math.max(posZMin, Math.min(posZMax, pz));
            rotX.value = rx.toFixed(2);
            rotY.value = ry.toFixed(2);
            rotZ.value = rz.toFixed(2);
            posX.value = px.toFixed(3);
            posY.value = py.toFixed(3);
            posZ.value = pz.toFixed(3);
          };
          const syncRangeToNum = (rangeEl, numEl, isRot) => {
            const v = parseFloat(rangeEl.value);
            numEl.value = isRot ? v.toFixed(2) : v.toFixed(3);
            updateNode();
          };
          const syncNumToRange = (numEl, rangeEl, isRot, pMin, pMax) => {
            const v = parseFloat(numEl.value);
            if (!isNaN(v)) {
              const low = isRot ? rotMin : pMin;
              const high = isRot ? rotMax : pMax;
              rangeEl.value = Math.max(low, Math.min(high, v));
              updateNode();
            }
          };
          [[rotXRange, rotX, true, 0, 0], [rotYRange, rotY, true, 0, 0], [rotZRange, rotZ, true, 0, 0], [posXRange, posX, false, posXMin, posXMax], [posYRange, posY, false, posYMin, posYMax], [posZRange, posZ, false, posZMin, posZMax]].forEach(([rangeEl, numEl, isRot, pMin, pMax]) => {
            rangeEl.addEventListener("input", () => syncRangeToNum(rangeEl, numEl, isRot));
            numEl.addEventListener("input", () => syncNumToRange(numEl, rangeEl, isRot, pMin, pMax));
            numEl.addEventListener("change", () => syncNumToRange(numEl, rangeEl, isRot, pMin, pMax));
          });
          listEl.appendChild(block);
        });
      }
      function escapeHtml(s) {
        const div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      // 加载模型的通用函数
      function loadModel(urlOrFile) {
        const loader = new GLTFLoader();
        
        const onLoad = (gltf) => {
          const model = gltf.scene;
          modelRef = model;
          
          // 设置阴影和环境贴图
          model.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
              
              // 如果已有环境贴图，应用到材质（不修改 transparent/opacity）；透明材质使用补偿强度以保留反射
              if (envMap && child.material) {
                if (Array.isArray(child.material)) {
                  child.material.forEach((mat) => {
                    if (mat.isMeshStandardMaterial || mat.isMeshPhysicalMaterial) {
                      mat.envMap = envMap;
                      mat.envMapIntensity = getEnvMapIntensityForMaterial(mat, 1.0);
                      mat.needsUpdate = true;
                    }
                  });
                } else {
                  if (child.material.isMeshStandardMaterial || child.material.isMeshPhysicalMaterial) {
                    child.material.envMap = envMap;
                    child.material.envMapIntensity = getEnvMapIntensityForMaterial(child.material, 1.0);
                    child.material.needsUpdate = true;
                  }
                }
              }
            }
          });

          // 透明材质修正：仅当「开启透明度渲染」勾选时应用
          const transparencyCheck = document.getElementById("pbrTransparencyEnabled");
          if (transparencyCheck && transparencyCheck.checked) {
            model.traverse((child) => {
              if (child.isMesh && child.material) {
                const mats = Array.isArray(child.material) ? child.material : [child.material];
                let hasTransparent = false;
                mats.forEach((mat) => {
                  const isTransparent = mat.transparent === true || (typeof mat.opacity === "number" && mat.opacity < 1);
                  if (isTransparent) {
                    hasTransparent = true;
                    mat.transparent = true;
                    mat.depthWrite = false;
                    if (mat.side !== undefined) mat.side = THREE.DoubleSide;
                    mat.needsUpdate = true;
                  }
                });
                if (hasTransparent) child.renderOrder = 1;
              }
            });
          }

          // 计算模型边界并居中
          const box = new THREE.Box3().setFromObject(model);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());

          // 将模型居中
          model.position.sub(center);
          scene.add(model);

          // 将地面平台移到模型正下方，便于接收阴影
          groundPlaneMesh.position.y = -size.y / 2 - 0.05;

          // 同步地面网格位置
          groundGridHelper.position.copy(groundPlaneMesh.position);

          // 模型三轴辅助：根据面板开关决定是否显示
          if (modelAxesHelper) {
            model.remove(modelAxesHelper);
            modelAxesHelper = null;
          }
          const axesCheck = document.getElementById("modelAxesEnabled");
          if (axesCheck && axesCheck.checked) {
            modelAxesHelper = new THREE.AxesHelper(Math.max(size.x, size.y, size.z) * 0.8);
            model.add(modelAxesHelper);
          }

          // 同步场景面板中的模型位置输入框为 0,0,0
          const mpX = document.getElementById("modelPosX");
          const mpY = document.getElementById("modelPosY");
          const mpZ = document.getElementById("modelPosZ");
          if (mpX) mpX.value = "0";
          if (mpY) mpY.value = "0";
          if (mpZ) mpZ.value = "0";

          // 计算相机距离
          const fov = camera.fov * (Math.PI / 180);
          // 根据模型高度计算距离
          const distance = Math.abs(size.y / 2 / Math.tan(fov / 2));
          
          // 设置相机位置
          const angle = Math.PI / 6;
          camera.position.set(
            distance * Math.sin(angle),
            distance * Math.cos(angle) * 0.3,
            distance * Math.cos(angle)
          );
          camera.lookAt(0, 0, 0);
          
          // 更新控制器目标为模型中心
          controls.target.set(0, 0, 0);
          controls.update();

          // 调整相机和控制器以适应模型
          const maxDim = Math.max(size.x, size.y, size.z);
          controls.maxDistance = maxDim * 3;
          controls.minDistance = maxDim * 0.01; 
          // 设置更小的 near 值，允许相机更靠近模型而不被裁剪
          camera.near = Math.max(maxDim / 1000, 0.001);
          camera.far = maxDim * 20;
          camera.updateProjectionMatrix();
          
          // 打印所有mesh
          const allMeshes = [];
          model.traverse((child) => {
            if (child.isMesh) {
              allMeshes.push({
                name: child.name || "未命名",
                type: child.type,
                uuid: child.uuid,
                visible: child.visible,
                position: {
                  x: child.position.x.toFixed(4),
                  y: child.position.y.toFixed(4),
                  z: child.position.z.toFixed(4)
                },
                material: child.material ? {
                  type: child.material.type,
                  color: child.material.color ? child.material.color.getHexString() : null
                } : null,
                geometry: child.geometry ? {
                  type: child.geometry.type,
                  vertices: child.geometry.attributes.position ? child.geometry.attributes.position.count : 0
                } : null
              });
            }
          });
          console.log(allMeshes);
          
          // 自动生成环境贴图（仅当未使用图片环境贴图时）
          setTimeout(() => {
            try {
              if (!useImageEnvMap) {
                generateEnvironmentMapFromScene();
                console.log("环境贴图已自动生成");
              }
              if (typeof syncPbrFromPanel === "function") syncPbrFromPanel();
            } catch (error) {
              console.warn("自动生成环境贴图失败:", error);
            }
          }, 100);
          buildJointPanel(modelRef);
        };

        const onProgress = (progress) => {
          const percent = (progress.loaded / progress.total) * 100;
          console.log(`加载进度: ${percent.toFixed(2)}%`);
        };

        const onError = (error) => {
          console.error("加载模型失败:", error);
          alert("加载模型失败，请检查文件格式是否正确。");
        };

        // 如果是File对象，使用URL.createObjectURL转换为URL
        if (urlOrFile instanceof File) {
          const objectURL = URL.createObjectURL(urlOrFile);
          loader.load(
            objectURL,
            (gltf) => {
              onLoad(gltf);
              // 释放对象URL
              URL.revokeObjectURL(objectURL);
            },
            onProgress,
            (error) => {
              onError(error);
              URL.revokeObjectURL(objectURL);
            }
          );
        } else {
          // 如果是URL字符串，直接加载
          loader.load(urlOrFile, onLoad, onProgress, onError);
        }
      }

      // 初始加载模型
      loadModel("./xyz_test01.glb");

      // 格式化文件大小
      function formatBytes(bytes) {
        if (bytes == null || bytes === 0) return "—";
        const k = 1024;
        const sizes = ["B", "KB", "MB", "GB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + " " + sizes[i];
      }

      // 统计模型面数（三角形）
      function getModelFaceCount() {
        if (!modelRef) return 0;
        let faces = 0;
        modelRef.traverse((child) => {
          if (child.isMesh && child.geometry) {
            const g = child.geometry;
            if (g.index) faces += g.index.count / 3;
            else if (g.attributes && g.attributes.position) faces += g.attributes.position.count / 3;
          }
        });
        return Math.floor(faces);
      }

      // 左下角模型信息面板与 FPS
      let lastFpsTime = performance.now();
      let fpsFrameCount = 0;
      let displayFps = 0;
      const modelInfoFileSizeEl = document.getElementById("modelInfoFileSize");
      const modelInfoFacesEl = document.getElementById("modelInfoFaces");
      const modelInfoFpsEl = document.getElementById("modelInfoFps");

      function updateModelInfoPanel() {
        if (modelInfoFileSizeEl) modelInfoFileSizeEl.textContent = "文件大小: " + formatBytes(lastModelFileSize);
        if (modelInfoFacesEl) modelInfoFacesEl.textContent = "面数: " + (modelRef ? getModelFaceCount().toLocaleString() : "—");
        if (modelInfoFpsEl) modelInfoFpsEl.textContent = "帧率: " + Math.round(displayFps) + " FPS";
      }

      // 窗口大小调整
      const resize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      };

      window.addEventListener("resize", resize);

      // 动画循环
      const animate = () => {
        requestAnimationFrame(animate);
        const now = performance.now();
        const delta = now - lastFpsTime;
        fpsFrameCount++;
        if (delta >= 500) {
          displayFps = (fpsFrameCount * 1000) / delta;
          fpsFrameCount = 0;
          lastFpsTime = now;
        }
        updateModelInfoPanel();

        controls.update();
        
        // 更新流动效果 - 从起点向终点流动
        flowEffects.forEach((effect) => {
          // 负值表示从起点向终点流动
          effect.texture.offset.x -= 0.01 * effect.speed;
        });
        
        renderer.render(scene, camera);
      };

      animate();

      // 恢复所有高亮的mesh
      function restoreHighlightedMeshes() {
        highlightedMeshes.forEach((item) => {
          if (item.mesh && item.originalMaterial) {
            item.mesh.material = item.originalMaterial;
            item.mesh.visible = item.originalVisible !== undefined ? item.originalVisible : true;
          }
        });
        highlightedMeshes = [];
        
        // 删除所有重新绘制的粗线
        highlightedLines.forEach((line) => {
          if (line && line.parent) {
            line.parent.remove(line);
          }
        });
        highlightedLines = [];
        
        // 清除流动效果
        flowEffects = [];
      }

      // 从线对象提取顶点
      function extractPointsFromLine(lineObject) {
        if (!lineObject.geometry) return [];
        
        const geometry = lineObject.geometry;
        const positions = geometry.attributes.position;
        if (!positions || positions.count < 2) return [];
        
        const points = [];
        
        // 应用世界变换矩阵
        lineObject.updateMatrixWorld(true);
        
        // 提取顶点
        for (let i = 0; i < positions.count; i++) {
          const point = new THREE.Vector3();
          point.fromBufferAttribute(positions, i);
          point.applyMatrix4(lineObject.matrixWorld);
          points.push(point);
        }
        
        return points;
      }

      // 创建橘色和白色相间的条纹纹理
      function createOrangeWhiteStripedTexture() {
        const canvas = document.createElement("canvas");
        canvas.width = 256;
        canvas.height = 256;
        const context = canvas.getContext("2d");

        const stripeWidth = 64; // 条纹宽度
        for (let i = 0; i <= canvas.width; i += stripeWidth) {
          // 计算当前条纹的颜色：每两个stripeWidth为一个周期（橘色+白色）
          const cycleIndex = Math.floor(i / (stripeWidth * 2));
          const positionInCycle = (i % (stripeWidth * 2)) / stripeWidth;
          const isOrange = positionInCycle < 1;
          
          // 橘色 #FF8C00 或 #FFA500
          context.fillStyle = isOrange ? "#FF8C00" : "#ffffff";
          // 确保最后一条条纹填满到画布边缘
          const actualWidth = Math.min(stripeWidth, canvas.width - i);
          context.fillRect(i, 0, actualWidth, canvas.height);
        }

        const texture = new THREE.CanvasTexture(canvas);
        // 确保纹理不进行模糊处理，保持条纹清晰
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        return texture;
      }

      // 创建粗线（使用TubeGeometry和CatmullRomCurve3）
      function createThickLine(points, baseRadius = 0.01) {
        if (points.length < 2) return null;
        const radius = baseRadius * 0.2;
        
        // 使用CatmullRomCurve3创建平滑曲线
        // 如果只有2个点，CatmullRomCurve3会自动创建直线
        let curve;
        if (points.length === 2) {
          // 对于2个点，添加一个中间点来创建平滑曲线
          const midPoint = new THREE.Vector3().addVectors(points[0], points[1]).multiplyScalar(0.5);
          const curvePoints = [points[0], midPoint, points[1]];
          curve = new THREE.CatmullRomCurve3(curvePoints, false, "catmullrom", 0.5);
        } else {
          curve = new THREE.CatmullRomCurve3(points, false, "catmullrom", 0.5);
        }
        
        // 计算分段数，确保曲线足够平滑
        const segments = Math.max(64, points.length * 12);
        const tubeGeometry = new THREE.TubeGeometry(curve, segments, radius, 16, false);
        
        // 创建橘色和白色相间的条纹纹理
        const texture = createOrangeWhiteStripedTexture();
        // 设置纹理重复，使条纹沿曲线方向重复
        texture.repeat.set(15, 1);
        
        // 创建使用纹理的材质
        const flowMaterial = new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          side: THREE.DoubleSide
        });
        
        const tube = new THREE.Mesh(tubeGeometry, flowMaterial);
        
        // 存储纹理和速度信息，用于动画
        flowEffects.push({
          texture: texture,
          mesh: tube,
          speed: 1.0 // 流动速度
        });
        
        return tube;
      }
      // 从mesh提取顶点（用于创建曲线）
      function extractPointsFromMesh(mesh) {
        if (!mesh || !mesh.geometry) return [];
        
        const geometry = mesh.geometry;
        if (!geometry.attributes || !geometry.attributes.position) return [];
        
        mesh.updateMatrixWorld(true);
        const points = [];
        const positions = geometry.attributes.position;
        
        // 如果有索引，按索引顺序提取
        if (geometry.index) {
          const index = geometry.index;
          const seen = new Set();
          for (let i = 0; i < index.count; i++) {
            const vertexIndex = index.getX(i);
            const point = new THREE.Vector3();
            point.fromBufferAttribute(positions, vertexIndex);
            point.applyMatrix4(mesh.matrixWorld);
            
            // 去重（允许小的误差）
            const key = `${point.x.toFixed(6)},${point.y.toFixed(6)},${point.z.toFixed(6)}`;
            if (!seen.has(key)) {
              seen.add(key);
              points.push(point);
            }
          }
        } else {
          // 没有索引，直接提取所有顶点
          const seen = new Set();
          for (let i = 0; i < positions.count; i++) {
            const point = new THREE.Vector3();
            point.fromBufferAttribute(positions, i);
            point.applyMatrix4(mesh.matrixWorld);
            
            // 去重
            const key = `${point.x.toFixed(6)},${point.y.toFixed(6)},${point.z.toFixed(6)}`;
            if (!seen.has(key)) {
              seen.add(key);
              points.push(point);
            }
          }
        }
        
        return points;
      }

      // 高亮mesh或线 - 每个匹配的对象都创建一条独立的曲线
      function highlightMeshOrLine(obj) {
        if (!obj) return;
        
        // 计算合适的线粗细
        const box = new THREE.Box3().setFromObject(modelRef);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const lineRadius = maxDim * 0.003;
        
        let points = [];
        
        // 检查是否是线对象
        if (obj.isLine || obj.isLineSegments) {
          // 从线对象提取顶点
          points = extractPointsFromLine(obj);
        } else if (obj.isMesh) {
          // 从mesh提取顶点
          points = extractPointsFromMesh(obj);
        }
        
        // 如果提取到足够的点，创建一条曲线
        if (points.length >= 2) {
          const thickLine = createThickLine(points, lineRadius);
          if (thickLine) {
            scene.add(thickLine);
            highlightedLines.push(thickLine);
          }
        } else if (obj.isMesh && points.length < 2) {
          // 如果mesh顶点数不足或提取失败，使用原来的高亮方式
          highlightMesh(obj);
        }
      }
      
      // 高亮mesh（保留用于普通mesh）
      function highlightMesh(mesh) {
        if (!mesh || !mesh.isMesh) return;

        // 保存原始材质和可见性
        if (!mesh.userData.originalMaterial) {
          mesh.userData.originalMaterial = mesh.material;
        }
        if (mesh.userData.originalVisible === undefined) {
          mesh.userData.originalVisible = mesh.visible;
        }

        // 创建高亮材质
        const highlightMaterial = new THREE.MeshStandardMaterial({
          color: 0x00ff00,
          emissive: 0x00ff00, // 发光颜色
          emissiveIntensity: 1.5, // 增强发光强度
          metalness: 0.0,
          roughness: 0.2,
          side: THREE.DoubleSide // 双面渲染
        });

        // 如果mesh有顶点色，保留顶点色但增强发光
        if (mesh.geometry && mesh.geometry.attributes && mesh.geometry.attributes.color) {
          highlightMaterial.vertexColors = true;
          highlightMaterial.emissiveIntensity = 2.0;
          highlightMaterial.emissive = new THREE.Color(0x00ff00);
        }

        // 应用高亮材质
        mesh.material = highlightMaterial;
        mesh.visible = true;

        // 保存到高亮列表
        highlightedMeshes.push({
          mesh: mesh,
          originalMaterial: mesh.userData.originalMaterial,
          originalVisible: mesh.userData.originalVisible
        });
      }

      // 文件上传相关事件监听
      const uploadButton = document.getElementById("uploadButton");
      const fileInput = document.getElementById("fileInput");
      
      // 点击上传按钮时触发文件选择
      uploadButton.addEventListener("click", () => {
        fileInput.click();
      });
      
      // 文件选择变化时加载新模型
      fileInput.addEventListener("change", (event) => {
        const file = event.target.files[0];
        if (file) {
          // 检查文件类型
          if (!file.name.toLowerCase().endsWith('.glb') && !file.name.toLowerCase().endsWith('.gltf')) {
            alert("请选择GLB或GLTF格式的文件！");
            fileInput.value = "";
            return;
          }
          
          // 移除旧模型
          removeOldModel();
          
          lastModelFileSize = file.size;
          // 加载新模型
          loadModel(file);
        }
      });

      // 右侧 PBR 渲染面板：将参数应用到当前模型（可选关闭 PBR/环境贴图）
      function applyPbrToModel(metalness, roughness, envMapIntensity) {
        if (!modelRef) return;
        const envEnabled = document.getElementById("pbrEnvEnabled") ? document.getElementById("pbrEnvEnabled").checked : true;
        if (!envEnabled) {
          scene.environment = null;
          modelRef.traverse((child) => {
            if (child.isMesh && child.material) {
              const mats = Array.isArray(child.material) ? child.material : [child.material];
              mats.forEach((mat) => {
                if (mat.isMeshStandardMaterial || mat.isMeshPhysicalMaterial) {
                  mat.envMap = null;
                  mat.envMapIntensity = 0;
                  mat.needsUpdate = true;
                }
              });
            }
          });
          return;
        }
        scene.environment = envMap;
        modelRef.traverse((child) => {
          if (child.isMesh && child.material) {
            const mats = Array.isArray(child.material) ? child.material : [child.material];
            mats.forEach((mat) => {
              if (mat.isMeshStandardMaterial || mat.isMeshPhysicalMaterial) {
                const isTransparent = mat.transparent === true || (typeof mat.opacity === "number" && mat.opacity < 1);
                if (!isTransparent) {
                  mat.metalness = metalness;
                  mat.roughness = roughness;
                }
                mat.envMapIntensity = getEnvMapIntensityForMaterial(mat, envMapIntensity);
                if (envMap) mat.envMap = envMap;
                mat.needsUpdate = true;
              }
            });
          }
        });
      }

      function applyTransparencyFix(enable) {
        if (!modelRef) return;
        modelRef.traverse((child) => {
          if (child.isMesh && child.material) {
            const mats = Array.isArray(child.material) ? child.material : [child.material];
            let hasTransparent = false;
            mats.forEach((mat) => {
              const isTransparent = mat.transparent === true || (typeof mat.opacity === "number" && mat.opacity < 1);
              if (isTransparent) {
                hasTransparent = true;
                mat.transparent = enable;
                mat.depthWrite = !enable;
                if (mat.side !== undefined) mat.side = enable ? THREE.DoubleSide : THREE.FrontSide;
                mat.needsUpdate = true;
              }
            });
            child.renderOrder = hasTransparent && enable ? 1 : 0;
          }
        });
      }

      function applyTransparencyParams(opacity, alphaTest) {
        if (!modelRef) return;
        const baseIntensityEl = document.getElementById("pbrEnvMapIntensityValue");
        const baseIntensity = baseIntensityEl ? parseFloat(baseIntensityEl.value) ?? 1 : 1;
        modelRef.traverse((child) => {
          if (child.isMesh && child.material) {
            const mats = Array.isArray(child.material) ? child.material : [child.material];
            mats.forEach((mat) => {
              const isTransparent = mat.transparent === true || (typeof mat.opacity === "number" && mat.opacity < 1);
              if (isTransparent && (mat.isMeshStandardMaterial || mat.isMeshPhysicalMaterial)) {
                mat.opacity = opacity;
                mat.alphaTest = alphaTest;
                mat.envMapIntensity = getEnvMapIntensityForMaterial(mat, baseIntensity);
                if (envMap) mat.envMap = envMap;
                mat.needsUpdate = true;
              }
            });
          }
        });
      }

      const pbrMetalness = document.getElementById("pbrMetalness");
      const pbrMetalnessValue = document.getElementById("pbrMetalnessValue");
      const pbrRoughness = document.getElementById("pbrRoughness");
      const pbrRoughnessValue = document.getElementById("pbrRoughnessValue");
      const pbrEnvMapIntensity = document.getElementById("pbrEnvMapIntensity");
      const pbrEnvMapIntensityValue = document.getElementById("pbrEnvMapIntensityValue");

      function syncPbrFromPanel() {
        const m = parseFloat(pbrMetalnessValue.value) || 0;
        const r = parseFloat(pbrRoughnessValue.value) ?? 0.5;
        const e = parseFloat(pbrEnvMapIntensityValue.value) ?? 1;
        applyPbrToModel(m, r, e);
      }

      pbrMetalness.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value) || 0;
        pbrMetalnessValue.value = v.toFixed(2);
        syncPbrFromPanel();
      });
      pbrMetalnessValue.addEventListener("input", () => syncPbrFromPanel());

      pbrRoughness.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value) ?? 0.5;
        pbrRoughnessValue.value = v.toFixed(2);
        syncPbrFromPanel();
      });
      pbrRoughnessValue.addEventListener("input", () => syncPbrFromPanel());

      pbrEnvMapIntensity.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value) ?? 1;
        pbrEnvMapIntensityValue.value = v.toFixed(2);
        syncPbrFromPanel();
      });
      pbrEnvMapIntensityValue.addEventListener("input", () => syncPbrFromPanel());

      const pbrEnvEnabled = document.getElementById("pbrEnvEnabled");
      const pbrTransparencyEnabled = document.getElementById("pbrTransparencyEnabled");
      const pbrTransparencyControls = document.getElementById("pbrTransparencyControls");
      const pbrOpacity = document.getElementById("pbrOpacity");
      const pbrOpacityValue = document.getElementById("pbrOpacityValue");
      const pbrAlphaTest = document.getElementById("pbrAlphaTest");
      const pbrAlphaTestValue = document.getElementById("pbrAlphaTestValue");

      if (pbrEnvEnabled) pbrEnvEnabled.addEventListener("change", () => syncPbrFromPanel());

      if (pbrTransparencyEnabled) {
        pbrTransparencyEnabled.addEventListener("change", (e) => {
          const on = e.target.checked;
          if (pbrTransparencyControls) pbrTransparencyControls.style.display = on ? "block" : "none";
          applyTransparencyFix(on);
          if (on) {
            const op = parseFloat(pbrOpacityValue ? pbrOpacityValue.value : 0.8) || 0.8;
            const at = parseFloat(pbrAlphaTestValue ? pbrAlphaTestValue.value : 0) || 0;
            applyTransparencyParams(op, at);
          }
        });
      }

      function syncTransparencyFromPanel() {
        const op = parseFloat(pbrOpacityValue ? pbrOpacityValue.value : 0.8) || 0.8;
        const at = parseFloat(pbrAlphaTestValue ? pbrAlphaTestValue.value : 0) || 0;
        applyTransparencyParams(op, at);
      }
      if (pbrOpacity) pbrOpacity.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value) ?? 0.8;
        if (pbrOpacityValue) pbrOpacityValue.value = v.toFixed(2);
        syncTransparencyFromPanel();
      });
      if (pbrOpacityValue) pbrOpacityValue.addEventListener("input", () => syncTransparencyFromPanel());
      if (pbrAlphaTest) pbrAlphaTest.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value) || 0;
        if (pbrAlphaTestValue) pbrAlphaTestValue.value = v.toFixed(2);
        syncTransparencyFromPanel();
      });
      if (pbrAlphaTestValue) pbrAlphaTestValue.addEventListener("input", () => syncTransparencyFromPanel());

      // 场景与地面面板事件监听
      const modelPosX = document.getElementById("modelPosX");
      const modelPosY = document.getElementById("modelPosY");
      const modelPosZ = document.getElementById("modelPosZ");
      const sceneBgColor = document.getElementById("sceneBgColor");
      const groundSizeW = document.getElementById("groundSizeW");
      const groundSizeD = document.getElementById("groundSizeD");
      const groundColor = document.getElementById("groundColor");
      const shadowEnabled = document.getElementById("shadowEnabled");
      const shadowRadius = document.getElementById("shadowRadius");
      const shadowRadiusValue = document.getElementById("shadowRadiusValue");
      const groundGridEnabled = document.getElementById("groundGridEnabled");
      const modelAxesEnabled = document.getElementById("modelAxesEnabled");

      function applyModelPosition() {
        if (!modelRef) return;
        const x = parseFloat(modelPosX.value) || 0;
        const y = parseFloat(modelPosY.value) || 0;
        const z = parseFloat(modelPosZ.value) || 0;
        modelRef.position.set(x, y, z);
      }
      [modelPosX, modelPosY, modelPosZ].forEach((el) => el.addEventListener("input", applyModelPosition));

      sceneBgColor.addEventListener("input", (e) => {
        scene.background.setStyle(e.target.value);
      });

      function applyGroundSize() {
        const w = Math.max(1, parseFloat(groundSizeW.value) || 20);
        const d = Math.max(1, parseFloat(groundSizeD.value) || 20);
        groundPlaneMesh.scale.set(w / 20, d / 20, 1);
        groundGridHelper.scale.set(w / 20, 1, d / 20);
      }
      groundSizeW.addEventListener("input", applyGroundSize);
      groundSizeD.addEventListener("input", applyGroundSize);

      groundColor.addEventListener("input", (e) => {
        groundPlaneMesh.material.color.setStyle(e.target.value);
      });

      shadowEnabled.addEventListener("change", (e) => {
        const on = e.target.checked;
        renderer.shadowMap.enabled = on;
        dirLight.castShadow = on;
      });

      shadowRadius.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value) || 0;
        dirLight.shadow.radius = v;
        shadowRadiusValue.value = v.toFixed(1);
      });
      shadowRadiusValue.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value) || 0;
        dirLight.shadow.radius = v;
        shadowRadius.value = v;
      });

      groundGridEnabled.addEventListener("change", (e) => {
        const useGrid = e.target.checked;
        groundGridHelper.visible = useGrid;
        groundPlaneMesh.visible = !useGrid;
      });

      modelAxesEnabled.addEventListener("change", (e) => {
        if (!modelRef) return;
        if (e.target.checked) {
          if (modelAxesHelper) return;
          const box = new THREE.Box3().setFromObject(modelRef);
          const size = box.getSize(new THREE.Vector3());
          modelAxesHelper = new THREE.AxesHelper(Math.max(size.x, size.y, size.z) * 0.8);
          modelRef.add(modelAxesHelper);
        } else {
          if (modelAxesHelper) {
            modelRef.remove(modelAxesHelper);
            modelAxesHelper.geometry.dispose();
            modelAxesHelper = null;
          }
        }
      });

      // 左侧光照面板：环境光 + 主光源平行光
      const leftHemiIntensity = document.getElementById("leftHemiIntensity");
      const leftHemiIntensityValue = document.getElementById("leftHemiIntensityValue");
      const leftDirIntensity = document.getElementById("leftDirIntensity");
      const leftDirIntensityValue = document.getElementById("leftDirIntensityValue");
      const leftDirX = document.getElementById("leftDirX");
      const leftDirY = document.getElementById("leftDirY");
      const leftDirZ = document.getElementById("leftDirZ");

      leftHemiIntensity.addEventListener("input", (e) => {
        const value = parseFloat(e.target.value);
        hemiLight.intensity = value;
        leftHemiIntensityValue.value = value.toFixed(1);
      });
      leftHemiIntensityValue.addEventListener("input", (e) => {
        const value = parseFloat(e.target.value);
        hemiLight.intensity = value;
        leftHemiIntensity.value = value;
      });

      leftDirIntensity.addEventListener("input", (e) => {
        const value = parseFloat(e.target.value);
        dirLight.intensity = value;
        leftDirIntensityValue.value = value.toFixed(1);
      });
      leftDirIntensityValue.addEventListener("input", (e) => {
        const value = parseFloat(e.target.value);
        dirLight.intensity = value;
        leftDirIntensity.value = value;
      });

      [leftDirX, leftDirY, leftDirZ].forEach((input, index) => {
        input.addEventListener("input", (e) => {
          const value = parseFloat(e.target.value);
          if (index === 0) dirLight.position.x = value;
          else if (index === 1) dirLight.position.y = value;
          else if (index === 2) dirLight.position.z = value;
        });
      });

      // 当光照参数改变时，自动重新生成环境贴图
      const lightingInputs = [
        leftHemiIntensity, leftHemiIntensityValue, leftDirIntensity, leftDirIntensityValue,
        leftDirX, leftDirY, leftDirZ
      ];
      
      // 防抖函数，避免频繁重新生成
      let envMapRegenerateTimer = null;
      function regenerateEnvMapDebounced() {
        if (envMapRegenerateTimer) {
          clearTimeout(envMapRegenerateTimer);
        }
        envMapRegenerateTimer = setTimeout(() => {
          if (modelRef && envMap && !useImageEnvMap) {
            try {
              generateEnvironmentMapFromScene();
              console.log("环境贴图已根据新的光照参数重新生成");
            } catch (error) {
              console.warn("重新生成环境贴图失败:", error);
            }
          }
        }, 500); // 延迟500ms后重新生成
      }
      
      lightingInputs.forEach(input => {
        if (input) {
          input.addEventListener("input", () => {
            regenerateEnvMapDebounced();
          });
        }
      });
    </script>
  </body>
</html>
